<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A896;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00A896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B3A5C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="60" cy="60" r="58" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>

  <!-- Book/Education symbol -->
  <g transform="translate(60, 60)">
    <!-- Left page -->
    <path d="M -15 -10 L -5 -10 L -5 15 L -15 15 Z" fill="#D4AF37" opacity="0.8"/>
    
    <!-- Right page -->
    <path d="M 5 -10 L 15 -10 L 15 15 L 5 15 Z" fill="white" opacity="0.9"/>
    
    <!-- Spine -->
    <rect x="-3" y="-10" width="6" height="25" fill="white" opacity="0.7"/>
    
    <!-- Text lines on pages -->
    <line x1="-12" y1="0" x2="-8" y2="0" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="-12" y1="5" x2="-8" y2="5" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="0" x2="12" y2="0" stroke="#1B3A5C" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="5" x2="12" y2="5" stroke="#1B3A5C" stroke-width="1.5" opacity="0.7"/>
    <line x1="8" y1="10" x2="12" y2="10" stroke="#1B3A5C" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Text: W for Waqar -->
  <text x="60" y="110" font-family="'Merriweather', serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1B3A5C" opacity="0.8">WAQAR</text>
</svg>